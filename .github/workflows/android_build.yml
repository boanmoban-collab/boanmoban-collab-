name: Android CI/CD Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger of the build

jobs:
  build:
    name: Build Android Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Validate and Repair Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          # Check if the gradle-wrapper.jar exists and is a valid zip archive, otherwise fetch a clean version from Gradle repository
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || ! unzip -t gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
            echo "⚠️ Gradle wrapper JAR is missing or corrupted. Downloading standard Gradle 9.3.1 wrapper JAR..."
            curl -sSL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar
          else
            echo "✅ Gradle wrapper JAR is present and valid."
          fi

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Create fallback .env file
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
