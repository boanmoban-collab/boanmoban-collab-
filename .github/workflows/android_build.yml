name: Android CI/CD Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger of the build

jobs:
  build:
    name: Build Android Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Validate and Repair Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          # Check if the gradle-wrapper.jar exists and is a valid zip archive, otherwise fetch a clean version from Gradle repository
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || ! unzip -t gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
            echo "⚠️ Gradle wrapper JAR is missing or corrupted. Downloading standard Gradle 9.3.1 wrapper JAR..."
            curl -sSL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar
          else
            echo "✅ Gradle wrapper JAR is present and valid."
          fi

      - name: Recreate Keystore from Base64
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "✅ debug.keystore successfully recreated from base64"
          else
            echo "⚠️ debug.keystore.base64 not found!"
          fi

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Create fallback .env file
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Release Bundle (AAB)
        run: ./gradlew bundleRelease --no-daemon

      - name: Verify Generated Outputs
        run: |
          echo "=== Verifying APK output ==="
          ls -la app/build/outputs/apk/release/
          if [ ! -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "❌ app-release.apk was not generated!"
            exit 1
          fi
          echo "=== Verifying AAB output ==="
          ls -la app/build/outputs/bundle/release/
          if [ ! -f app/build/outputs/bundle/release/app-release.aab ]; then
            echo "❌ app-release.aab was not generated!"
            exit 1
          fi
          echo "✅ Both artifacts generated successfully!"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release and Attach Artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
